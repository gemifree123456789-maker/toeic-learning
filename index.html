<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC AI Tutor</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <style>
      html.app-booting body > * { visibility: hidden; }
      html.app-booting #bootLoading { visibility: visible; }
      #bootLoading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f2f2f7; z-index: 99999; }
      .word-modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; z-index: 10001; padding: 25px 20px; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); transform: translateY(100%); transition: transform 0.3s; }
      .word-modal.active { display: block; transform: translateY(0); }
      .wm-extra-container { margin-top: 15px; padding: 12px; background: #f8f9fa; border-radius: 12px; font-size: 14px; }
      .wm-section-title { font-weight: bold; color: #5856D6; margin-bottom: 5px; }
    </style>
</head>
<body class="app-booting">
    <div id="bootLoading"><div class="boot-loading-spinner"></div><div>Loading...</div></div>

    <header>
        <h1 data-i18n="appTitle">TOEIC AI Tutor</h1>
        <div class="header-right">
            <button id="btnAnnouncement"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
            <button id="btnSettings"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        </div>
    </header>

    <main>
        <div id="tabLearn" class="container">
            <div id="learningArea" class="hidden">
                <div class="article-card">
                    <div id="articleMeta"></div>
                    <div id="articleContainer"></div>
                    <div class="toggle-row">
                        <button id="btnToggleEn" class="toggle-btn">隱藏英文</button>
                        <button id="btnToggleZh" class="toggle-btn">顯示中文</button>
                    </div>
                </div>
                <div id="vocabList" class="vocab-grid"></div>
            </div>
            <div id="emptyState" class="empty-state">
                <p data-i18n="emptyTitle">尚未開始學習</p>
                <button class="cta-btn" onclick="switchTab('practice')">前往練習</button>
            </div>
        </div>

        <div id="tabPractice" class="container hidden">
            <div class="practice-mode-switch">
                <button class="practice-mode-btn active" data-mode="article">文章練習</button>
                <button class="practice-mode-btn" data-mode="speaking">口說對話</button>
                <button class="practice-mode-btn" data-mode="exam">模擬考試</button>
            </div>
            <div id="practicePanelArticle" class="mode-panel">
                <div class="config-card">
                    <label>難度：<strong id="difficultyValue">700</strong></label>
                    <input type="range" id="aiDifficultySlider" min="500" max="990" step="50" value="700">
                    <input type="text" id="customTopic" placeholder="輸入主題...">
                    <button class="generate-btn" id="btnGenerate">開始學習</button>
                </div>
            </div>
            <div id="practicePanelSpeaking" class="mode-panel hidden">
                <div class="config-card">
                    <button class="generate-btn" id="btnStartSpeaking">開始口說對話</button>
                </div>
            </div>
            <div id="practicePanelExam" class="mode-panel hidden">
                <div class="config-card">
                    <button class="generate-btn" id="btnStartExam">開始模擬考試</button>
                </div>
            </div>
        </div>
    </main>

    <div class="word-modal" id="wordModal">
        <div class="wm-header">
            <h2 id="wmWord">Word</h2>
            <button id="btnWordAudio">🔊</button>
        </div>
        <div class="wm-meta"><span id="wmPos"></span> <span id="wmIpa"></span></div>
        <div class="wm-def" id="wmDef"></div>
        <div class="wm-ex">
            <p id="wmExText"></p>
            <p id="wmExZh" class="hidden"></p>
        </div>
        <div id="wmActionArea" class="wm-actions"></div>
        <button class="wm-close" onclick="document.getElementById('wordModal').classList.remove('active')">關閉</button>
    </div>

    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="learn">學習</button>
        <button class="tab-btn" data-tab="practice">練習</button>
        <button class="tab-btn" data-tab="vocab">單字本</button>
    </nav>

    <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
